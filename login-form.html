<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulaire de connexion</title>
<style>
  :root {
    --color-primary: #2563eb;
    --color-primary-dark: #1d4ed8;
    --color-primary-light: #3b82f6;
    --color-error: #dc2626;
    --color-error-bg: #fee2e2;
    --color-success: #16a34a;
    --color-success-bg: #dcfce7;
    --color-border: #d1d5db;
    --color-border-hover: #9ca3af;
    --color-text: #111827;
    --color-icon: #9ca3af;
  }

  * {
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--color-text);
    position: relative;
    overflow-x: hidden;

    /* Arrière-plan "ciel" */
    background: linear-gradient(to bottom, #7ec8f2 0%, #a9dcf5 35%, #d9eefb 70%, #f0f8fd 100%);
  }

  /* ===================== ARRIERE-PLAN NUAGES ===================== */
  .clouds-bg {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }

  .cloud {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.85;
    filter: blur(0.5px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
  }

  /* Chaque nuage est composé de plusieurs cercles superposés (technique CSS classique) */
  .cloud::before,
  .cloud::after {
    content: "";
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
  }

  .cloud-1 {
    width: 120px;
    height: 44px;
    top: 8%;
    left: -160px;
    animation: float-right 42s linear infinite;
  }
  .cloud-1::before { width: 70px; height: 70px; top: -34px; left: 15px; }
  .cloud-1::after  { width: 50px; height: 50px; top: -22px; left: 65px; }

  .cloud-2 {
    width: 90px;
    height: 34px;
    top: 20%;
    left: -140px;
    animation: float-right 55s linear infinite;
    animation-delay: -18s;
  }
  .cloud-2::before { width: 55px; height: 55px; top: -26px; left: 10px; }
  .cloud-2::after  { width: 38px; height: 38px; top: -16px; left: 48px; }

  .cloud-3 {
    width: 150px;
    height: 52px;
    top: 62%;
    left: -190px;
    animation: float-right 60s linear infinite;
    animation-delay: -30s;
    opacity: 0.7;
  }
  .cloud-3::before { width: 85px; height: 85px; top: -42px; left: 20px; }
  .cloud-3::after  { width: 60px; height: 60px; top: -26px; left: 80px; }

  .cloud-4 {
    width: 100px;
    height: 38px;
    top: 78%;
    left: -150px;
    animation: float-right 48s linear infinite;
    animation-delay: -10s;
    opacity: 0.6;
  }
  .cloud-4::before { width: 60px; height: 60px; top: -28px; left: 12px; }
  .cloud-4::after  { width: 42px; height: 42px; top: -18px; left: 52px; }

  @keyframes float-right {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 300px)); }
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .login-card {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(4px);
    padding: 2.5rem;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(30, 58, 138, 0.15);
    width: 100%;
    max-width: 380px;
  }

  .login-card h1 {
    font-size: 1.4rem;
    margin: 0 0 1.5rem 0;
    text-align: center;
  }

  .form-group {
    margin-bottom: 1.2rem;
  }

  label {
    display: block;
    margin-bottom: 0.4rem;
    font-size: 0.9rem;
    font-weight: 600;
  }

  /* Conteneur pour positionner les icônes à l'intérieur des champs */
  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-icon);
    pointer-events: none;
    transition: color 0.2s ease;
  }

  .input-icon svg {
    width: 18px;
    height: 18px;
  }

  /* Styles communs aux deux champs, ciblés par ID pour rester stables
     même quand #password bascule entre type="password" et type="text" */
  #email,
  #password {
    width: 100%;
    padding: 0.65rem 0.75rem 0.65rem 2.5rem;
    border: 1px solid var(--color-border);
    border-radius: 8px;
    font-size: 1rem;
    transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
  }

  /* Espace supplémentaire à droite pour le champ mot de passe (icône œil) */
  #password {
    padding-right: 2.6rem;
  }

  #email:hover,
  #password:hover {
    border-color: var(--color-border-hover);
    background-color: #fafafa;
  }

  #email:focus,
  #password:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
  }

  .input-wrapper:focus-within .input-icon {
    color: var(--color-primary);
  }

  input.input-error {
    border-color: var(--color-error);
  }

  input.input-error:hover {
    border-color: var(--color-error);
  }

  /* Bouton "œil" pour afficher/masquer le mot de passe */
  .toggle-password {
    position: absolute;
    right: 0.65rem;
    background: none;
    border: none;
    padding: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--color-icon);
    cursor: pointer;
    border-radius: 6px;
    transition: color 0.2s ease, background-color 0.2s ease;
  }

  .toggle-password:hover {
    color: var(--color-primary);
    background-color: rgba(37, 99, 235, 0.08);
  }

  .toggle-password svg {
    width: 19px;
    height: 19px;
  }

  .toggle-password .icon-eye-off {
    display: none;
  }

  .toggle-password.is-visible .icon-eye {
    display: none;
  }

  .toggle-password.is-visible .icon-eye-off {
    display: inline-flex;
  }

  .field-error {
    display: none;
    color: var(--color-error);
    font-size: 0.8rem;
    margin-top: 0.35rem;
  }

  .field-error.visible {
    display: block;
  }

  button[type="submit"] {
    position: relative;
    width: 100%;
    padding: 0.75rem;
    background-color: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }

  button[type="submit"]:hover:not(:disabled) {
    background-color: var(--color-primary-dark);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
    transform: translateY(-1px);
  }

  button[type="submit"]:active:not(:disabled) {
    transform: translateY(0);
  }

  button[type="submit"]:disabled {
    cursor: not-allowed;
    opacity: 0.85;
  }

  button[type="submit"].loading {
    color: transparent;
    background-color: var(--color-primary-light);
  }

  .btn-spinner {
    display: none;
    position: absolute;
    top: 50%;
    left: 50%;
    width: 18px;
    height: 18px;
    margin-top: -9px;
    margin-left: -9px;
    border: 2.5px solid rgba(255, 255, 255, 0.4);
    border-top-color: #ffffff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  button[type="submit"].loading .btn-spinner {
    display: block;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #form-message {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    display: none;
  }

  #form-message.visible {
    display: block;
  }

  #form-message.success {
    background-color: var(--color-success-bg);
    color: var(--color-success);
    border: 1px solid var(--color-success);
  }

  #form-message.error {
    background-color: var(--color-error-bg);
    color: var(--color-error);
    border: 1px solid var(--color-error);
  }

  .test-doc {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 2rem auto;
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(4px);
    padding: 2rem;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
  }

  .test-doc h2 {
    font-size: 1.2rem;
    margin-top: 0;
  }

  .test-doc table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  .test-doc th,
  .test-doc td {
    border: 1px solid var(--color-border);
    padding: 0.5rem 0.6rem;
    text-align: left;
    vertical-align: top;
  }

  .test-doc th {
    background-color: #f9fafb;
  }

  .test-doc code {
    background: #f3f4f6;
    padding: 0.1rem 0.3rem;
    border-radius: 4px;
    font-size: 0.8rem;
  }


  .field-message  {
    color:#111827;
    font-size: 0.8rem;
    margin-top: 0.35rem;
  }

  
</style>
</head>
<body>

<!-- ===================== ARRIERE-PLAN DECORATIF (NUAGES) ===================== -->
<div class="clouds-bg" aria-hidden="true">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
</div>

<div class="wrapper">

  <!-- ===================== FORMULAIRE DE CONNEXION ===================== -->
  <div class="login-card">
    <h1>Connexion</h1>

    <form id="login-form" data-testid="login-form" novalidate>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <!-- Icône enveloppe -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h16v16H4z"></path>
              <path d="m22 6-10 7L2 6"></path>
            </svg>
          </span>
          <input
            type="email"
            id="email"
            name="email"
            data-testid="email-input"
            autocomplete="username"
            placeholder="exemple@mail.com"
          >
        </div>
        <span id="email-error" class="field-error" data-testid="email-error"></span>
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <div class="input-wrapper">
          <span class="input-icon" aria-hidden="true">
            <!-- Icône cadenas -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="10" rx="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </span>
          <input
            type="password"
            id="password"
            name="password"
            data-testid="password-input"
            autocomplete="current-password"
            placeholder="********"
          >
          <!-- Bouton pour afficher / masquer le mot de passe -->
          <button type="button" class="toggle-password" id="toggle-password" data-testid="toggle-password" aria-label="Afficher le mot de passe">
            <span class="icon-eye">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </span>
            <span class="icon-eye-off">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A10.9 10.9 0 0 1 12 4c7 0 11 8 11 8a18.6 18.6 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </span>
          </button>
        </div>
        <span id="password-error" class="field-error" data-testid="password-error"></span>
      </div>

      <button type="submit" id="submit-btn" data-testid="submit-button">
        <span class="btn-label">Connexion</span>
        <span class="btn-spinner" data-testid="submit-spinner"></span>
      </button>

      <div id="form-message" data-testid="form-message" role="alert"></div>

    </form>
  </div>
          <p class = field-message >
      test@mail.com - password123
      </p>

</div>

<script>
  const VALID_EMAIL = "test@mail.com";
  const VALID_PASSWORD = "password123";
  const LOADING_DURATION = 800;

  const form = document.getElementById("login-form");
  const emailInput = document.getElementById("email");
  const passwordInput = document.getElementById("password");
  const emailError = document.getElementById("email-error");
  const passwordError = document.getElementById("password-error");
  const messageBox = document.getElementById("form-message");
  const submitBtn = document.getElementById("submit-btn");
  const togglePasswordBtn = document.getElementById("toggle-password");

  function showFieldError(input, errorEl, text) {
    input.classList.add("input-error");
    errorEl.textContent = text;
    errorEl.classList.add("visible");
  }

  function clearFieldError(input, errorEl) {
    input.classList.remove("input-error");
    errorEl.textContent = "";
    errorEl.classList.remove("visible");
  }

  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = "";
    messageBox.classList.add("visible", type);
  }

  function hideMessage() {
    messageBox.textContent = "";
    messageBox.className = "";
  }

  emailInput.addEventListener("input", () => clearFieldError(emailInput, emailError));
  passwordInput.addEventListener("input", () => clearFieldError(passwordInput, passwordError));

  // Affichage / masquage du mot de passe via l'icône "œil"
  togglePasswordBtn.addEventListener("click", () => {
    const isVisible = passwordInput.type === "text";
    passwordInput.type = isVisible ? "password" : "text";
    togglePasswordBtn.classList.toggle("is-visible", !isVisible);
    togglePasswordBtn.setAttribute(
      "aria-label",
      isVisible ? "Afficher le mot de passe" : "Masquer le mot de passe"
    );
  });

  function setLoadingState(isLoading) {
    submitBtn.disabled = isLoading;
    submitBtn.classList.toggle("loading", isLoading);
  }

  form.addEventListener("submit", function (event) {
    event.preventDefault();

    clearFieldError(emailInput, emailError);
    clearFieldError(passwordInput, passwordError);
    hideMessage();

    const email = emailInput.value.trim();
    const password = passwordInput.value.trim();

    let hasEmptyField = false;

    if (email === "") {
      showFieldError(emailInput, emailError, "L'email est obligatoire.");
      hasEmptyField = true;
    }

    if (password === "") {
      showFieldError(passwordInput, passwordError, "Le mot de passe est obligatoire.");
      hasEmptyField = true;
    }

    if (hasEmptyField) {
      return;
    }

    setLoadingState(true);

    setTimeout(() => {
      setLoadingState(false);

      if (email === VALID_EMAIL && password === VALID_PASSWORD) {
        showMessage("Connexion réussie ! Bienvenue.", "success");
      } else {
        setFieldsInvalidStyle();
        showMessage("Email ou mot de passe incorrect.", "error");
      }
    }, LOADING_DURATION);
  });

  function setFieldsInvalidStyle() {
    emailInput.classList.add("input-error");
    passwordInput.classList.add("input-error");
  }
</script>

</body>
</html>
