<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sélection des compétences QA</title>
<style>
  :root {
    --color-primary: #2563eb;
    --color-primary-dark: #1d4ed8;
    --color-primary-light: #3b82f6;
    --color-error: #dc2626;
    --color-error-bg: #fee2e2;
    --color-success: #16a34a;
    --color-border: #d1d5db;
    --color-border-hover: #9ca3af;
    --color-text: #111827;
    --color-muted: #6b7280;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--color-text);
    position: relative;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #7ec8f2 0%, #a9dcf5 35%, #d9eefb 70%, #f0f8fd 100%);
  }

  /* ===================== ARRIERE-PLAN NUAGES ===================== */
  .clouds-bg {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }

  .cloud {
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
    opacity: 0.85;
    filter: blur(0.5px);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
  }

  .cloud::before,
  .cloud::after {
    content: "";
    position: absolute;
    background: #ffffff;
    border-radius: 50%;
  }

  .cloud-1 { width: 120px; height: 44px; top: 8%; left: -160px; animation: float-right 42s linear infinite; }
  .cloud-1::before { width: 70px; height: 70px; top: -34px; left: 15px; }
  .cloud-1::after  { width: 50px; height: 50px; top: -22px; left: 65px; }

  .cloud-2 { width: 90px; height: 34px; top: 20%; left: -140px; animation: float-right 55s linear infinite; animation-delay: -18s; }
  .cloud-2::before { width: 55px; height: 55px; top: -26px; left: 10px; }
  .cloud-2::after  { width: 38px; height: 38px; top: -16px; left: 48px; }

  .cloud-3 { width: 150px; height: 52px; top: 62%; left: -190px; animation: float-right 60s linear infinite; animation-delay: -30s; opacity: 0.7; }
  .cloud-3::before { width: 85px; height: 85px; top: -42px; left: 20px; }
  .cloud-3::after  { width: 60px; height: 60px; top: -26px; left: 80px; }

  .cloud-4 { width: 100px; height: 38px; top: 78%; left: -150px; animation: float-right 48s linear infinite; animation-delay: -10s; opacity: 0.6; }
  .cloud-4::before { width: 60px; height: 60px; top: -28px; left: 12px; }
  .cloud-4::after  { width: 42px; height: 42px; top: -18px; left: 52px; }

  @keyframes float-right {
    from { transform: translateX(0); }
    to   { transform: translateX(calc(100vw + 300px)); }
  }

  /* ===================== ARRIERE-PLAN OISEAUX ===================== */
  .birds-bg {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: 0;
    pointer-events: none;
  }

  .bird {
    position: absolute;
    width: 34px;
    height: 20px;
    color: rgba(55, 65, 81, 0.55);
    animation-name: fly-right, bob;
    animation-timing-function: linear, ease-in-out;
    animation-iteration-count: infinite, infinite;
  }

  .bird svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .bird .wing-left,
  .bird .wing-right {
    transform-origin: 17px 10px;
    animation: flap 0.55s ease-in-out infinite alternate;
  }

  .bird .wing-right { animation-delay: 0s; }
  .bird .wing-left { animation-delay: 0.02s; }

  @keyframes flap {
    from { transform: scaleY(1) rotate(0deg); }
    to   { transform: scaleY(0.55) rotate(0deg); }
  }

  @keyframes fly-right {
    from { transform: translateX(-80px); }
    to   { transform: translateX(calc(100vw + 80px)); }
  }

  @keyframes bob {
    0%, 100% { margin-top: 0; }
    50% { margin-top: -14px; }
  }

  .bird-1 { top: 14%; width: 30px; height: 18px; animation-duration: 16s, 2.2s; animation-delay: 0s, 0s; }
  .bird-2 { top: 24%; width: 22px; height: 13px; animation-duration: 21s, 1.8s; animation-delay: -6s, -0.4s; opacity: 0.75; }
  .bird-3 { top: 10%; width: 26px; height: 16px; animation-duration: 19s, 2s; animation-delay: -12s, -0.8s; opacity: 0.6; }
  .bird-4 { top: 32%; width: 20px; height: 12px; animation-duration: 24s, 1.6s; animation-delay: -3s, -1.1s; opacity: 0.5; }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .skills-card {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(4px);
    padding: 2.25rem 2.25rem 2rem;
    border-radius: 16px;
    box-shadow: 0 8px 30px rgba(30, 58, 138, 0.15);
    width: 100%;
    max-width: 460px;
  }

  .skills-card h1 {
    font-size: 1.3rem;
    margin: 0 0 0.4rem 0;
  }

  .skills-card .subtitle {
    margin: 0 0 1.4rem 0;
    font-size: 0.9rem;
    color: var(--color-muted);
  }

  /* Boutons "Tout sélectionner" / "Tout désélectionner" */
  .bulk-actions {
    display: flex;
    gap: 0.6rem;
    margin-bottom: 1.2rem;
  }

  .bulk-btn {
    flex: 1;
    padding: 0.5rem 0.6rem;
    font-size: 0.82rem;
    font-weight: 600;
    border-radius: 8px;
    border: 1px solid var(--color-border);
    background: #ffffff;
    color: var(--color-primary);
    cursor: pointer;
    transition: background-color 0.2s ease, border-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
  }

  .bulk-btn:hover:not(:disabled) {
    background-color: #eff6ff;
    border-color: var(--color-primary);
    box-shadow: 0 2px 8px rgba(37, 99, 235, 0.15);
    transform: translateY(-1px);
  }

  .bulk-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .bulk-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Liste des compétences (checkbox custom) */
  .skills-list {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    margin-bottom: 0.6rem;
  }

  .skill-option {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.65rem 0.8rem;
    border: 1px solid var(--color-border);
    border-radius: 10px;
    cursor: pointer;
    transition: border-color 0.2s ease, background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
    -webkit-user-select: none;
    user-select: none;
  }

  .skill-option:hover {
    border-color: var(--color-border-hover);
    background-color: #fafafa;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  }

  .skill-option.checked {
    border-color: var(--color-primary);
    background-color: #eff6ff;
  }

  .skill-option.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Vraie checkbox native, visible, avec un style agrandi et cohérent avec le thème */
  .skill-option input[type="checkbox"] {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    margin: 0;
    accent-color: var(--color-primary);
    cursor: pointer;
  }

  .skill-label {
    font-size: 0.95rem;
    font-weight: 500;
  }

  /* Compteur / message d'aide */
  #skills-hint {
    font-size: 0.82rem;
    margin: 0.4rem 0 1.2rem 0;
    color: var(--color-muted);
    min-height: 1.1em;
  }

  #skills-hint.error {
    color: var(--color-error);
    font-weight: 600;
  }

  #skills-hint.valid {
    color: var(--color-success);
    font-weight: 600;
  }

  /* Bouton Suivant */
  .next-btn {
    width: 100%;
    padding: 0.75rem;
    background-color: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background-color 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  }

  .next-btn:hover:not(:disabled) {
    background-color: var(--color-primary-dark);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.35);
    transform: translateY(-1px);
  }

  .next-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .next-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* Zone de message global (succès / erreur de sélection) */
  #skills-message {
    margin-top: 1rem;
    margin-bottom: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.88rem;
    display: none;
  }

  #skills-message.visible {
    display: block;
  }

  #skills-message.success {
    background-color: #dcfce7;
    color: var(--color-success);
    border: 1px solid var(--color-success);
  }

  #skills-message.error {
    background-color: var(--color-error-bg);
    color: var(--color-error);
    border: 1px solid var(--color-error);
  }
</style>
</head>
<body>

<!-- ===================== ARRIERE-PLAN DECORATIF ===================== -->
<div class="clouds-bg" aria-hidden="true">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
</div>

<div class="birds-bg" aria-hidden="true">
  <div class="bird bird-1">
    <svg viewBox="0 0 34 20">
      <path class="wing-left" d="M17 10 C 12 2, 4 2, 0 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
      <path class="wing-right" d="M17 10 C 22 2, 30 2, 34 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
    </svg>
  </div>
  <div class="bird bird-2">
    <svg viewBox="0 0 34 20">
      <path class="wing-left" d="M17 10 C 12 2, 4 2, 0 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
      <path class="wing-right" d="M17 10 C 22 2, 30 2, 34 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
    </svg>
  </div>
  <div class="bird bird-3">
    <svg viewBox="0 0 34 20">
      <path class="wing-left" d="M17 10 C 12 2, 4 2, 0 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
      <path class="wing-right" d="M17 10 C 22 2, 30 2, 34 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
    </svg>
  </div>
  <div class="bird bird-4">
    <svg viewBox="0 0 34 20">
      <path class="wing-left" d="M17 10 C 12 2, 4 2, 0 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
      <path class="wing-right" d="M17 10 C 22 2, 30 2, 34 8" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"></path>
    </svg>
  </div>
</div>

<div class="wrapper">

  <!-- ===================== FORMULAIRE COMPETENCES QA ===================== -->
  <div class="skills-card">
    <h1 data-testid="skills-title">Suivant : Sélectionnez vos compétences QA</h1>
    <p class="subtitle" data-testid="skills-subtitle">Choisissez entre 1 et 4 compétences.</p>

    <form id="skills-form" data-testid="skills-form" novalidate>

      <div class="bulk-actions">
        <button type="button" class="bulk-btn" id="select-all-btn" data-testid="select-all-button">Tout sélectionner</button>
        <button type="button" class="bulk-btn" id="deselect-all-btn" data-testid="deselect-all-button">Tout désélectionner</button>
      </div>

      <div class="skills-list" id="skills-list">

        <label class="skill-option" data-testid="skill-option-html-css">
          <input type="checkbox" name="skill" value="HTML / CSS" data-testid="skill-checkbox-html-css">
          <span class="skill-label">HTML / CSS</span>
        </label>

        <label class="skill-option" data-testid="skill-option-javascript">
          <input type="checkbox" name="skill" value="JavaScript" data-testid="skill-checkbox-javascript">
          <span class="skill-label">JavaScript</span>
        </label>

        <label class="skill-option" data-testid="skill-option-playwright">
          <input type="checkbox" name="skill" value="Playwright" data-testid="skill-checkbox-playwright">
          <span class="skill-label">Playwright</span>
        </label>

        <label class="skill-option" data-testid="skill-option-cypress">
          <input type="checkbox" name="skill" value="Cypress" data-testid="skill-checkbox-cypress">
          <span class="skill-label">Cypress</span>
        </label>

        <label class="skill-option" data-testid="skill-option-selenium">
          <input type="checkbox" name="skill" value="Selenium" data-testid="skill-checkbox-selenium">
          <span class="skill-label">Selenium</span>
        </label>

        <label class="skill-option" data-testid="skill-option-test-api">
          <input type="checkbox" name="skill" value="Test API" data-testid="skill-checkbox-test-api">
          <span class="skill-label">Test API</span>
        </label>

      </div>

      <p id="skills-hint" data-testid="skills-hint">0 / 4 compétence(s) sélectionnée(s)</p>

      <div id="skills-message" data-testid="skills-message" role="alert"></div>

      <button type="submit" class="next-btn" id="validate-btn" data-testid="validate-button">Valider</button>

    </form>
  </div>

</div>

<script>
  /**
   * ===============================================================
   * Logique de sélection des compétences QA (1 à 4 sélections requises)
   * ===============================================================
   */

  const MIN_SELECTION = 1;
  const MAX_SELECTION = 4;

  const form = document.getElementById("skills-form");
  const checkboxes = Array.from(document.querySelectorAll('input[name="skill"]'));
  const options = Array.from(document.querySelectorAll(".skill-option"));
  const selectAllBtn = document.getElementById("select-all-btn");
  const deselectAllBtn = document.getElementById("deselect-all-btn");
  const hint = document.getElementById("skills-hint");
  const validateBtn = document.getElementById("validate-btn");
  const messageBox = document.getElementById("skills-message");

  /**
   * Met à jour l'état visuel (case cochée) d'un skill-option
   * en fonction de l'état de sa checkbox associée.
   */
  function syncOptionVisual(option) {
    const checkbox = option.querySelector('input[type="checkbox"]');
    option.classList.toggle("checked", checkbox.checked);
  }

  /**
   * Affiche un message dans la zone globale (succès / erreur).
   */
  function showMessage(text, type) {
    messageBox.textContent = text;
    messageBox.className = "";
    messageBox.classList.add("visible", type);
  }

  /**
   * Cache la zone de message globale.
   */
  function hideMessage() {
    messageBox.textContent = "";
    messageBox.className = "";
  }

  /**
   * Recalcule le nombre de compétences sélectionnées et met à jour :
   * - le texte d'aide (compteur),
   * - l'activation des boutons "Tout sélectionner / désélectionner".
   * N'affiche plus de blocage : l'utilisateur peut cocher autant de cases
   * qu'il le souhaite, la validation se fait au clic sur "Valider".
   */
  function updateState() {
    const checkedCount = checkboxes.filter((cb) => cb.checked).length;

    hint.textContent = `${checkedCount} / ${MAX_SELECTION} compétence(s) sélectionnée(s)`;
    hint.classList.remove("error", "valid");

    if (checkedCount === 0 || checkedCount > MAX_SELECTION) {
      hint.classList.add("error");
    } else {
      hint.classList.add("valid");
    }

    options.forEach((option) => syncOptionVisual(option));

    // Désactive les boutons de sélection groupée quand ils ne servent à rien
    selectAllBtn.disabled = checkedCount === checkboxes.length;
    deselectAllBtn.disabled = checkedCount === 0;

    // Le message global disparaît dès que l'utilisateur modifie sa sélection
    hideMessage();
  }

  // Ecoute les changements sur chaque case à cocher
  checkboxes.forEach((cb) => {
    cb.addEventListener("change", updateState);
  });

  // "Tout sélectionner" : coche TOUTES les compétences (y compris au-delà de 4,
  // l'utilisateur verra alors le message d'erreur au moment de valider)
  selectAllBtn.addEventListener("click", () => {
    checkboxes.forEach((cb) => {
      cb.checked = true;
    });
    updateState();
  });

  // "Tout désélectionner" : décoche toutes les compétences
  deselectAllBtn.addEventListener("click", () => {
    checkboxes.forEach((cb) => {
      cb.checked = false;
    });
    updateState();
  });

  // Soumission du formulaire (validation)
  form.addEventListener("submit", (event) => {
    event.preventDefault();

    const selectedSkills = checkboxes
      .filter((cb) => cb.checked)
      .map((cb) => cb.value);

    const checkedCount = selectedSkills.length;

    // Cas 1 : aucune compétence sélectionnée
    if (checkedCount === 0) {
      showMessage("Veuillez sélectionner au moins une compétence.", "error");
      return;
    }

    // Cas 2 : plus de 4 compétences sélectionnées
    if (checkedCount > MAX_SELECTION) {
      showMessage("Vous ne pouvez pas sélectionner plus de 4 compétences.", "error");
      return;
    }

    // Cas 3 : exactement 4 compétences sélectionnées → confirmation d'enregistrement
    if (checkedCount === MAX_SELECTION) {
      showMessage(
        "Le nombre maximum de compétences (4) est atteint. Votre sélection a été enregistrée avec succès.",
        "success"
      );
      return;
    }

    // Cas 4 : entre 1 et 3 compétences sélectionnées → confirmation d'enregistrement
    showMessage(
      `Votre sélection de ${checkedCount} compétence(s) a été enregistrée avec succès.`,
      "success"
    );
  });

  // Initialisation de l'état au chargement de la page
  updateState();
</script>

</body>
</html>
